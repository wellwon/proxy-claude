<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Proxy Manager</title>
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3a;
    --text: #e0e0e8; --text2: #8888a0; --text3: #555568;
    --green: #00d26a; --red: #ff4757; --yellow: #ffa502; --blue: #3b82f6; --cyan: #06d6a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  .mono { font-family: 'SF Mono', ui-monospace, monospace; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text3); transition: all 0.3s; flex-shrink: 0; }
  .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.off { background: var(--yellow); }
  .git-btns { display: flex; gap: 6px; }
  .git-btn { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px; }
  .git-btn:hover { border-color: var(--blue); color: var(--text); }
  .git-btn:disabled { opacity: 0.3; pointer-events: none; }
  .git-btn.has-changes { border-color: var(--yellow); color: var(--yellow); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }

  /* Status */
  .status-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .status-main { display: flex; align-items: center; gap: 14px; flex: 1; }
  .status-flag { font-size: 42px; line-height: 1; }
  .status-ip { font-size: 24px; font-weight: 700; font-family: 'SF Mono', monospace; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; }
  .badge.proxy { background: rgba(0,210,106,0.15); color: var(--green); }
  .badge.direct { background: rgba(255,165,2,0.15); color: var(--yellow); }
  .btn-off { padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(255,71,87,0.3); background: transparent; color: var(--red); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-off:hover { background: rgba(255,71,87,0.1); border-color: var(--red); }
  .btn-off:disabled { opacity: 0.25; pointer-events: none; }
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .si { display: flex; flex-direction: column; gap: 1px; }
  .sl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .sv { font-size: 13px; font-weight: 500; }

  .sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .st { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .slink { font-size: 11px; color: var(--blue); cursor: pointer; background: none; border: none; padding: 0; }
  .slink:hover { text-decoration: underline; }

  /* Profiles */
  .plist { display: flex; flex-direction: column; gap: 5px; }
  .pi { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.15s; }
  .pi:hover { border-color: rgba(59,130,246,0.3); }
  .pi.active { border-color: var(--green); }
  .pi.expanded { border-color: var(--blue); }
  .pi.active.expanded { border-color: var(--green); }

  .prow { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; }
  .prow:hover { background: rgba(255,255,255,0.015); }
  .pleft { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .pflag { font-size: 20px; line-height: 1; width: 26px; text-align: center; }
  .pflag .lf { width: 20px; height: 14px; background: var(--border); border-radius: 2px; display: inline-block; }
  .pname { font-weight: 600; font-size: 13px; }
  .pbadges { display: flex; gap: 4px; align-items: center; margin-top: 2px; }
  .ptag { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-family: 'SF Mono', monospace; background: rgba(255,255,255,0.06); color: var(--text2); }
  .ploc { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .pstatus { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; flex-shrink: 0; }
  .pi.active .pstatus { background: var(--green); color: #000; }

  /* Expanded */
  .pdetails { display: none; padding: 0 14px 14px; }
  .pi.expanded .pdetails { display: block; }
  .dgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
  .di { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: var(--bg); border-radius: 5px; }
  .dleft { display: flex; flex-direction: column; gap: 0; min-width: 0; flex: 1; }
  .dlabel { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; }
  .dval { font-size: 12px; font-family: 'SF Mono', monospace; font-weight: 500; }
  .cpb { flex-shrink: 0; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; margin-left: 5px; }
  .cpb:hover { border-color: var(--blue); color: var(--text); }
  .cpb.ok { border-color: var(--green); color: var(--green); }
  .cpb svg { width: 12px; height: 12px; }

  .dacts { display: flex; align-items: center; gap: 6px; }
  .dacts .spacer { flex: 1; }
  .btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--blue); }
  .btn:disabled { opacity: 0.35; pointer-events: none; }
  .btn.green { border-color: var(--green); color: var(--green); }
  .btn.green:hover { background: rgba(0,210,106,0.1); }
  .btn.red { border-color: rgba(255,71,87,0.3); color: var(--red); }
  .btn.red:hover { background: rgba(255,71,87,0.1); border-color: var(--red); }
  .btn.sm { font-size: 10px; padding: 4px 8px; }

  /* Add */
  .add-form { margin-top: 8px; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; display: none; }
  .add-form.show { display: block; }
  .add-form label { display: block; font-size: 9px; color: var(--text3); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
  .add-form input, .add-form select { width: 100%; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 12px; font-family: 'SF Mono', monospace; margin-bottom: 8px; }
  .add-form input:focus, .add-form select:focus { outline: none; border-color: var(--blue); }
  .add-form select { font-family: -apple-system, sans-serif; }
  .add-hint { font-size: 10px; color: var(--text3); margin-bottom: 8px; }
  .add-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; }

  /* Services */
  .svcs { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .svc { display: flex; align-items: center; gap: 7px; padding: 6px 10px; background: var(--surface2); border-radius: 5px; font-size: 12px; }
  .sd { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .sd.ok { background: var(--green); }
  .sd.reachable { background: var(--yellow); }
  .sd.dead, .sd.error { background: var(--red); }
  .svc-d { font-size: 10px; color: var(--text3); }
  .svc-h { margin-top: 5px; font-size: 9px; color: var(--text3); }

  /* Modal */
  .mbg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .mbg.show { opacity: 1; pointer-events: all; }
  .mdl { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; max-width: 360px; width: 90%; }
  .mdl h3 { font-size: 14px; margin-bottom: 5px; }
  .mdl p { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.4; }
  .mdl-a { display: flex; gap: 8px; justify-content: flex-end; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); padding: 8px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.info { border-color: var(--blue); }
  .toast.warn { border-color: var(--yellow); }

  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: sp 0.6s linear infinite; vertical-align: middle; }
  @keyframes sp { to { transform: rotate(360deg); } }


  @media (max-width: 500px) {
    body { padding: 14px; }
    .status-grid, .svcs, .dgrid { grid-template-columns: 1fr; }
    .status-ip { font-size: 18px; }
  }
</style>
</head>
<body>


<div class="container" id="appContainer">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="dot" id="statusDot"></span>
      <h1>TERMINAL PROXY MANAGER</h1>
    </div>
    <div class="git-btns">
      <button class="git-btn" id="gitCommit" onclick="gitCommit()" disabled>commit</button>
      <button class="git-btn" id="gitPull" onclick="gitPull()" disabled>pull</button>
    </div>
  </div>

  <!-- Status -->
  <div class="card">
    <div class="status-top">
      <div class="status-main">
        <span class="status-flag" id="flag">-</span>
        <div>
          <div class="status-ip" id="ip">...</div>
          <span class="badge" id="modeBadge">...</span>
        </div>
      </div>
      <button class="btn-off" id="offBtn" onclick="proxyOff()" disabled>Выключить прокси</button>
    </div>
    <div class="status-grid">
      <div class="si"><span class="sl">Страна</span><span class="sv" id="country">-</span></div>
      <div class="si"><span class="sl">Город</span><span class="sv" id="city">-</span></div>
      <div class="si"><span class="sl">ISP</span><span class="sv" id="isp">-</span></div>
      <div class="si"><span class="sl">Профиль</span><span class="sv" id="profile">-</span></div>
    </div>
  </div>

  <!-- Profiles -->
  <div class="card">
    <div class="sh">
      <span class="st">Профили</span>
      <button class="slink" onclick="toggleAdd()">+ добавить</button>
    </div>
    <div class="plist" id="profiles"><div style="color:var(--text3);font-style:italic;font-size:12px">загрузка...</div></div>
    <div class="add-form" id="addForm">
      <label>Данные прокси</label>
      <input type="text" id="addRaw" placeholder="IP:PORT:LOGIN:PASS" autocomplete="off">
      <div class="add-hint">Формат: 23.229.62.156:8000:JMBKKJ:0nWAcm</div>
      <div class="add-row">
        <div><label>Название</label><input type="text" id="addName" placeholder="авто" autocomplete="off" style="margin-bottom:0"></div>
        <div><label>Протокол</label><select id="addProto" style="margin-bottom:0"><option value="http">HTTP</option><option value="socks5">SOCKS5</option></select></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn green" onclick="submitAdd()" id="addBtn">Добавить</button>
        <button class="btn" onclick="toggleAdd()">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Services -->
  <div class="card">
    <div class="sh">
      <span class="st">Доступность сервисов</span>
      <button class="slink" onclick="loadSvc()" id="svcR">обновить</button>
    </div>
    <div class="svcs" id="svcs"><div style="color:var(--text3);font-size:12px"><span class="spin"></span></div></div>
    <div class="svc-h">Зелёный = работает, жёлтый = доступен (нужен ключ), красный = не отвечает</div>
  </div>
</div>

<!-- Delete modal -->
<div class="mbg" id="delM"><div class="mdl"><h3>Удалить профиль?</h3><p>Профиль <strong id="delN"></strong> будет удалён.</p><div class="mdl-a"><button class="btn" onclick="closeDel()">Отмена</button><button class="btn red" onclick="doDel()">Удалить</button></div></div></div>

<div class="toast" id="toast"></div>

<script>
const A='';
let tT=null, delTgt=null, exp=null, profs=[];

function fl(cc){if(!cc||cc.length!==2)return'';return String.fromCodePoint(...cc.toUpperCase().split('').map(c=>0x1F1E6+c.charCodeAt(0)-65));}
const CSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
const OSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';

// Status
function applySt(d){
  if(!d||!d.connected){$('ip').textContent='Нет соединения';$('statusDot').className='dot off';$('offBtn').disabled=true;return;}
  const f=fl(d.countryCode);
  $('ip').textContent=d.ip;$('flag').textContent=f;
  $('country').textContent=f+' '+d.country+' ('+d.countryCode+')';
  $('city').textContent=d.city+', '+d.region;
  $('isp').textContent=d.isp;$('profile').textContent=d.profile||'— нет';
  if(d.proxy){$('statusDot').className='dot on';$('modeBadge').className='badge proxy';$('modeBadge').textContent='\u{1f6e1}\ufe0f PROXY';$('offBtn').disabled=false;}
  else{$('statusDot').className='dot off';$('modeBadge').className='badge direct';$('modeBadge').textContent='\u26a1 DIRECT';$('offBtn').disabled=true;}
}
async function loadSt(){try{applySt(await(await fetch(A+'/api/status')).json());}catch(e){$('ip').textContent='Ошибка';}}

// Profiles
async function loadP(){
  try{
    const d=await(await fetch(A+'/api/profiles')).json();profs=d.profiles;renP();
    for(const p of profs)if(!p.geo)fetchGeo(p.name);
  }catch(e){$('profiles').innerHTML='<div style="color:var(--text3);font-size:12px">Ошибка</div>';}
}

function renP(){
  const el=$('profiles');
  if(!profs.length){el.innerHTML='<div style="color:var(--text3);font-size:12px">Нет профилей</div>';return;}
  el.innerHTML=profs.map(p=>{
    const g=p.geo,f=g?fl(g.countryCode):'',loc=g?(g.city+', '+g.country):'';
    const isE=exp===p.name,isA=p.active;
    return`<div class="pi ${isA?'active':''} ${isE?'expanded':''}" id="pi-${p.name}">
      <div class="prow" onclick="togP('${p.name}')">
        <div class="pleft">
          <span class="pflag">${f||'<span class=lf></span>'}</span>
          <div>
            <div class="pname">${p.name}</div>
            <div class="pbadges"><span class="ptag">${p.ip}</span><span class="ptag">${p.port}</span><span class="ptag">${p.protocol}</span></div>
            ${loc?`<div class="ploc">${loc}</div>`:''}
          </div>
        </div>
        ${isA?'<span class="pstatus">\u25cf активен</span>':''}
      </div>
      <div class="pdetails">
        <div class="dgrid">
          ${dc('IP-адрес',p.ip,p.name+'i')}${dc('Порт',p.port,p.name+'p')}
          ${dc('Логин',p.login,p.name+'l')}${dc('Пароль',p.password,p.name+'w')}
        </div>
        <div class="dacts">
          ${isA
            ?`<button class="btn red" onclick="ev(event);proxyOff()">Отключить</button>`
            :`<button class="btn green" onclick="ev(event);swTo('${p.name}')">Включить</button>`}
          <button class="btn sm" onclick="ev(event);cpAll('${p.name}')">Скопировать всё</button>
          <span class="spacer"></span>
          <button class="btn red sm" onclick="ev(event);askDel('${p.name}')">Удалить</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function dc(l,v,id){
  if(!v)return`<div class="di"><div class="dleft"><span class="dlabel">${l}</span><span class="dval">—</span></div></div>`;
  return`<div class="di"><div class="dleft"><span class="dlabel">${l}</span><span class="dval">${v}</span></div><button class="cpb" id="c-${id}" onclick="ev(event);cp('${v}','c-${id}','${l}')">${CSvg}</button></div>`;
}
function togP(n){exp=(exp===n)?null:n;renP();}
function ev(e){e.stopPropagation();}

async function fetchGeo(n){
  try{const d=await(await fetch(A+'/api/profile-geo/'+encodeURIComponent(n))).json();
    if(d.countryCode){const p=profs.find(x=>x.name===n);if(p){p.geo=d;renP();}}}catch(e){}
}

// Switch
async function swTo(n){
  toast('Подключение...','info',15000);
  try{const d=await(await fetch(A+'/api/switch/'+encodeURIComponent(n))).json();
    if(d.ok){if(d.status)applySt(d.status);toast('Подключено: '+n,'success');loadP();loadSvc();}
    else{toast(d.error,'warn');loadP();}}catch(e){toast('Ошибка','warn');loadP();}
}
async function proxyOff(){
  $('offBtn').disabled=true;toast('Отключение...','info',15000);
  try{const d=await(await fetch(A+'/api/off')).json();
    if(d.status)applySt(d.status);toast('Прокси выключен','warn');loadP();loadSvc();}
  catch(e){toast('Ошибка','warn');loadP();}
}

// Delete
function askDel(n){delTgt=n;$('delN').textContent=n;$('delM').classList.add('show');}
function closeDel(){$('delM').classList.remove('show');delTgt=null;}
async function doDel(){if(!delTgt)return;const n=delTgt;closeDel();toast('Удаление...','info');
  try{const d=await(await fetch(A+'/api/delete/'+encodeURIComponent(n))).json();
    if(d.ok){toast(n+' удалён','success');exp=null;loadP();loadSt();loadSvc();}else toast(d.error,'warn');}catch(e){toast('Ошибка','warn');}}

// Add
function toggleAdd(){const f=$('addForm');f.classList.toggle('show');if(f.classList.contains('show'))$('addRaw').focus();}
async function submitAdd(){
  const raw=$('addRaw').value.trim(),name=$('addName').value.trim(),proto=$('addProto').value;
  if(!raw){toast('Введите данные','warn');return;}
  const b=$('addBtn');b.disabled=true;b.innerHTML='<span class="spin"></span>';toast('Добавление...','info',15000);
  try{const r=await fetch(A+'/api/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({raw,name,protocol:proto})});
    const d=await r.json();if(d.ok){toast('Добавлен: '+d.name,'success');$('addRaw').value='';$('addName').value='';$('addForm').classList.remove('show');loadP();}else toast(d.error,'warn');}
  catch(e){toast('Ошибка','warn');}b.disabled=false;b.textContent='Добавить';
}

// Copy
function cp(t,id,l){navigator.clipboard.writeText(t).then(()=>{const b=$(id);if(b){b.innerHTML=OSvg;b.classList.add('ok');setTimeout(()=>{b.innerHTML=CSvg;b.classList.remove('ok');},1200);}toast(l+' скопирован','success');});}
function cpAll(n){const p=profs.find(x=>x.name===n);if(!p)return;navigator.clipboard.writeText(`IP: ${p.ip}\nPort: ${p.port}\nLogin: ${p.login}\nPassword: ${p.password}\nProtocol: ${p.protocol}`).then(()=>toast('Скопировано','success'));}

// Services
async function loadSvc(){
  const el=$('svcs'),b=$('svcR');b.textContent='...';
  el.innerHTML='<div style="color:var(--text3)"><span class="spin"></span></div>';
  try{const d=await(await fetch(A+'/api/services')).json();
    el.innerHTML=d.services.map(s=>`<div class="svc"><span class="sd ${s.status}"></span><div><div>${s.name} <span style="color:var(--text3);font-size:10px">${s.code}</span></div><div class="svc-d">${s.desc}${s.status==='reachable'?' (нужен ключ)':''}</div></div></div>`).join('');}
  catch(e){el.innerHTML='<div style="color:var(--text3);font-size:12px">Ошибка</div>';}b.textContent='обновить';
}

// Git
async function checkGit(){
  try{const d=await(await fetch(A+'/api/git/status')).json();
    if(d.initialized){$('gitCommit').disabled=!d.changed;$('gitPull').disabled=!d.hasRemote;if(d.changed)$('gitCommit').classList.add('has-changes');else $('gitCommit').classList.remove('has-changes');}
  }catch(e){}}

async function gitCommit(){
  $('gitCommit').disabled=true;toast('Commit + push...','info',15000);
  try{const r=await fetch(A+'/api/git/commit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Update proxy config'})});
    const d=await r.json();if(d.ok)toast(d.message,'success');else toast(d.error,'warn');}
  catch(e){toast('Ошибка','warn');}checkGit();
}
async function gitPull(){
  $('gitPull').disabled=true;toast('Pull + deploy...','info',15000);
  try{const d=await(await fetch(A+'/api/git/pull',{method:'POST'})).json();
    if(d.ok)toast(d.message,'success');else toast(d.error,'warn');}
  catch(e){toast('Ошибка','warn');}checkGit();
}

// Toast & helpers
function toast(m,t='info',d=3000){const e=$('toast');e.textContent=m;e.className='toast show '+t;clearTimeout(tT);tT=setTimeout(()=>e.classList.remove('show'),d);}
function $(id){return document.getElementById(id);}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&$('addForm').classList.contains('show'))submitAdd();
  if(e.key==='Escape'){closeDel();$('addForm').classList.remove('show');}
});

function initApp(){loadSt();loadP();loadSvc();checkGit();setInterval(loadSt,30000);setInterval(checkGit,15000);}

// Init
initApp();
</script>
